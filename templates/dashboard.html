<!DOCTYPE html>
<html lang="en">
<head>

<title>AI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar{
    height:100vh;
    width:240px;
    position:fixed;
    background:#ffffff;
    border-right:1px solid #ddd;
    padding-top:20px;
}

.sidebar h4{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    padding:12px 20px;
    color:#333;
    text-decoration:none;
}

.sidebar a:hover{
    background:#eef2ff;
    color:#4f46e5;
}

/* Main */
.main{
    margin-left:250px;
    padding:30px;
}

/* Cards */
.card{
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.metric{
    font-size:30px;
    font-weight:bold;
}

/* AI Box */
.ai-box{
    background:white;
    padding:25px;
    border-radius:12px;
    border-left:6px solid #4f46e5;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* Report Button */
.report-btn{
    background:#4f46e5;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
}

</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<h4>🤖 Churn AI</h4>

<a href="/dashboard">Dashboard</a>
<a href="/home">Predict</a>
<a href="/history">History</a>
<a href="/analytics">Analytics</a>
<a href="/model_comparison">Models</a>

<hr>

<a href="/logout" class="text-danger">Logout</a>

</div>

<!-- Main -->
<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Customer AI Dashboard</h2>

<button onclick="downloadReport()" class="report-btn">
📄 Download Report
</button>

</div>

<!-- KPI Cards -->
<div class="row g-4">

<div class="col-md-3">
<div class="card">
<div>Total Customers</div>
<div class="metric">{{ total }}</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<div>Churn Customers</div>
<div class="metric text-danger">{{ churn }}</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<div>Active Customers</div>
<div class="metric text-success">{{ not_churn }}</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<div>Churn Rate</div>
<div class="metric">
{{ ((churn/total)*100)|round(2) if total else 0 }}%
</div>
</div>
</div>

</div>

<br>

<!-- AI ASSISTANT -->
<div class="ai-box">

<h5>🤖 AI Assistant Insights</h5>

<p id="aiText"></p>

</div>

</div>

<script>

const churn = Number("{{ churn }}");
const active = Number("{{ not_churn }}");
const total = churn + active;

// AI Logic
let insight = "";

if(churn > active){
    insight = "⚠️ High churn detected. Focus on customer retention strategies such as personalized offers and improved support.";
}
else if(churn > total * 0.3){
    insight = "⚠️ Moderate churn rate. Monitor customer behavior and improve engagement.";
}
else{
    insight = "✅ Customer base is stable. Continue maintaining service quality and loyalty programs.";
}

document.getElementById("aiText").innerText = insight;

// Report Download
function downloadReport(){

    const report = `
Customer Churn Report

Total Customers: ${total}
Churn Customers: ${churn}
Active Customers: ${active}
Churn Rate: ${((churn/total)*100).toFixed(2)}%

AI Insight:
${insight}
    `;

    const blob = new Blob([report], {type:"text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "churn_report.txt";
    link.click();
}

</script>

</body>
</html>
