<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Churn Prediction System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family: Arial, Helvetica, sans-serif;
overflow:hidden;
background:#0f2027;
}

/* flowing water background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background: linear-gradient(
45deg,
#0f2027,
#203a43,
#2c5364,
#203a43,
#0f2027
);
background-size:400% 400%;
animation: waterFlow 12s ease infinite;
z-index:-2;
}

@keyframes waterFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* floating bubbles */

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.08);
animation: float 8s infinite ease-in-out;
}

.bubble1{
width:300px;
height:300px;
top:10%;
left:15%;
}

.bubble2{
width:200px;
height:200px;
bottom:15%;
right:20%;
animation-duration:10s;
}

.bubble3{
width:150px;
height:150px;
top:70%;
left:30%;
animation-duration:7s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0px);}
}

/* glass card */

.main-card{
text-align:center;
padding:70px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
box-shadow: 0 30px 70px rgba(0,0,0,0.6);
width:650px;
color:white;
}

/* logo */

.logo{
width:800px;
max-width:90%;
margin-bottom:30px;
filter: drop-shadow(0px 0px 35px rgba(255,215,0,1));
}

/* shining title */

.title{
font-size:40px;
font-weight:700;
background: linear-gradient(90deg,#ffffff,#ffd700,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* subtitle */

.subtitle{
margin-top:20px;
font-size:18px;
opacity:0.9;
}

/* glowing button */

.enter-btn{
margin-top:40px;
font-size:20px;
padding:14px 45px;
border-radius:40px;
background: linear-gradient(45deg,#ffd700,#ffae00);
border:none;
color:black;
font-weight:600;
transition:0.3s;
box-shadow:0 0 15px rgba(255,215,0,0.6);
}

.enter-btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(255,215,0,1);
}

</style>

</head>

<body>

<div class="bubble bubble1"></div>
<div class="bubble bubble2"></div>
<div class="bubble bubble3"></div>

<div class="main-card">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Customer Churn Logo">

<h1 class="title">Customer Churn Prediction System</h1>

<p class="subtitle">
AI Powered System to Predict Customer Churn using Machine Learning
</p>

<a href="/login" class="enter-btn">
Enter System
</a>

</div>

</body>
</html>
